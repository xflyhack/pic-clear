name: Build Diag Pic EXE

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps
        # 对齐 requirements.txt 里锁的版本 (onnxruntime==1.19.2, numpy<2),
        # 保证跟 sqDedupe.exe 用的 runtime 完全一致, 避免堡垒机 VC++ Runtime 冲突.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Write _version.py from git ref
        run: |
          if "%GITHUB_REF_TYPE%"=="tag" (
            echo VERSION = "%GITHUB_REF_NAME%" > _version.py
          ) else (
            echo VERSION = "%GITHUB_REF_NAME%-%GITHUB_SHA:~0,7%" > _version.py
          )
          type _version.py
        shell: cmd

      - name: Install export-only deps (for yolov8n.onnx)
        # 只在 CI 里为了导出模型临时装 ultralytics/onnx/onnxslim,
        # 打包完就丢, 不会随 exe 分发 (打包只依赖 onnxruntime).
        run: |
          pip install ultralytics onnx onnxslim

      - name: Export yolov8n.onnx
        # 跟 build-windows-exe.yml 的 sqDedupe 打包步骤完全一致, 保证 diag_pic
        # 里跑 YOLO 复现的模型跟生产 sqDedupe.exe 用的是同一个.
        run: |
          curl -L -o yolov8n.pt https://github.com/ultralytics/assets/releases/download/v8.3.0/yolov8n.pt
          python -c "from ultralytics import YOLO; YOLO('yolov8n.pt').export(format='onnx', imgsz=640, opset=12, simplify=True, dynamic=False)"
          dir yolov8n.onnx

      - name: Download ffmpeg + ffprobe (static build for Windows)
        # v0.4.100: diag_pic '视频时长诊断' tab 需要 ffprobe.exe.
        # 直接从 BtbN 静态包里挑出来, 用 --add-binary 打进 exe,
        # 用户在堡垒机上开 diag_pic 就有内置 ffprobe, 不依赖机器 PATH.
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_dl
          $ff = Get-ChildItem -Recurse ffmpeg_dl -Filter ffmpeg.exe  | Select-Object -First 1
          $fp = Get-ChildItem -Recurse ffmpeg_dl -Filter ffprobe.exe | Select-Object -First 1
          Copy-Item $ff.FullName -Destination ffmpeg.exe
          Copy-Item $fp.FullName -Destination ffprobe.exe
          Get-Item ffmpeg.exe  | Select-Object Name, Length
          Get-Item ffprobe.exe | Select-Object Name, Length
        shell: pwsh

      - name: Prepare build folder
        run: |
          mkdir build_diag_pic
          copy diag_pic.py build_diag_pic\
          copy winpath_util.py build_diag_pic\
          copy env_probe.py build_diag_pic\
          copy dedupe_pic.py build_diag_pic\
          copy detector.py build_diag_pic\
          copy yolov8n.onnx build_diag_pic\
          copy _version.py build_diag_pic\
        shell: cmd

      - name: Build single-file exe (windowed)
        run: |
          cd build_diag_pic
          pyinstaller --onefile --windowed --name diagPicCheck ^
            --icon "..\icon.ico" ^
            --add-data "..\icon.ico;." ^
            --add-binary "..\ffmpeg.exe;." ^
            --add-binary "..\ffprobe.exe;." ^
            --add-data "..\yolov8n.onnx;." ^
            --hidden-import _version ^
            --hidden-import dedupe_pic ^
            --hidden-import detector ^
            --hidden-import numpy ^
            --hidden-import onnxruntime ^
            --hidden-import winpath_util ^
            --hidden-import env_probe ^
            --hidden-import tkinter ^
            --hidden-import tkinter.ttk ^
            --hidden-import tkinter.filedialog ^
            --hidden-import tkinter.messagebox ^
            --hidden-import PIL ^
            --hidden-import PIL.Image ^
            --hidden-import ctypes ^
            --hidden-import ctypes.wintypes ^
            diag_pic.py
          cd ..
        shell: cmd

      - name: Show exe size
        run: dir build_diag_pic\dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: diag-pic-check-windows-exe
          path: build_diag_pic/dist/diagPicCheck.exe
          if-no-files-found: error

      - name: Attach exe to GitHub Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build_diag_pic/dist/diagPicCheck.exe
          fail_on_unmatched_files: true
