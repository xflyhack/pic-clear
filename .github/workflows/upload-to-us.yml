name: Upload Release to US mirror

# 触发时机:
#   - release: published: tag 一 push 建 release 就触发, 但此时 8 个 build workflow 可能还没跑完.
#     所以下面加了 15 分钟 sleep 兜底 (等 asset 都挂上来).
#   - workflow_dispatch: 手动重跑指定 tag (asset 已经全在 release 上了立刻跑, 不 sleep).
#
# 前置条件 (在 GitHub 仓库 Secrets 里配好):
#   US_SSH_HOST       美国机器地址 (例如 23.95.88.247 或域名)
#   US_SSH_PORT       SSH 端口, 默认 22
#   US_SSH_USER       专用部署用户 (例如 picclear-deploy, 由 23 机器的 init_server.sh 建好)
#   US_SSH_KEY        对应的 SSH 私钥 (整个 -----BEGIN OPENSSH PRIVATE KEY----- ... 段)
#   US_UPLOADS_DIR    上传根目录 (例如 /data/pic-clear-uploads)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 手工重发的 tag (例如 v0.4.118)
        required: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      # 主动 poll 本 tag 下所有 build-*.yml workflow, 全部结束 (success/failure/cancelled)
      # 才继续. 比死 sleep 更可靠 -- 8 个 workflow 有的 10 分钟有的 30 分钟, 平均要等最慢的.
      # 触发路径无论 release:published 还是 workflow_dispatch, 都走这一步.
      - name: Wait for build workflows to finish
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          set -e
          # 所有以 build- 开头的 workflow 文件名 (排除本 workflow 自己 + release notes)
          BUILD_WFS=$(gh workflow list --repo "${{ github.repository }}" --all --json path --jq '.[].path | split("/") | .[-1]' | grep -E '^build-.*\.yml$' || true)
          echo "监控以下 build workflow:"
          echo "$BUILD_WFS"
          echo "---"
          MAX_WAIT_MIN=45
          INTERVAL=30
          START=$(date +%s)
          while :; do
            ELAPSED=$(( ($(date +%s) - START) / 60 ))
            if [ "$ELAPSED" -ge "$MAX_WAIT_MIN" ]; then
              echo "[WARN] 等待 ${MAX_WAIT_MIN} 分钟仍有 build workflow 未结束, 强制继续下 asset"
              break
            fi
            PENDING=0
            for WF in $BUILD_WFS; do
              # 找该 workflow 在本 tag 下最近一次 run 的状态
              STATE=$(gh run list --repo "${{ github.repository }}"                 --workflow "$WF" --branch "$TAG" --limit 1                 --json status,conclusion --jq '.[0] // {} | .status + "/" + (.conclusion//"null")' 2>/dev/null || echo "not_found/null")
              case "$STATE" in
                completed/*|not_found/null)
                  # not_found: 该 workflow 没被这个 tag 触发 (可能被 paths 过滤了), 也算完成
                  ;;
                *)
                  PENDING=$((PENDING+1))
                  echo "  等待: $WF  状态=$STATE"
                  ;;
              esac
            done
            if [ "$PENDING" -eq 0 ]; then
              echo "全部 build workflow 已结束, 继续下 asset (已等 ${ELAPSED} 分钟)"
              break
            fi
            echo "还有 $PENDING 个 workflow 未结束, ${INTERVAL}s 后再查 (已等 ${ELAPSED} 分钟)..."
            sleep "$INTERVAL"
          done

      - name: Download all release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/rel
          gh release download "${{ steps.tag.outputs.value }}" \
              --repo "${{ github.repository }}" \
              -D /tmp/rel/ \
              --pattern '*.exe' \
              --clobber
          ls -lh /tmp/rel/
          echo "共下载 $(ls /tmp/rel/*.exe 2>/dev/null | wc -l) 个 exe"

      - name: Generate .sha256 sidecar files
        run: |
          cd /tmp/rel
          for f in *.exe; do
            sha256sum "$f" | awk '{print $1}' > "$f.sha256"
            echo "$(cat $f.sha256)  $f"
          done

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.US_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # trust host key
          ssh-keyscan -p "${{ secrets.US_SSH_PORT || 22 }}" \
              -H "${{ secrets.US_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ensure remote version dir exists
        env:
          H: ${{ secrets.US_SSH_HOST }}
          P: ${{ secrets.US_SSH_PORT }}
          U: ${{ secrets.US_SSH_USER }}
          D: ${{ secrets.US_UPLOADS_DIR }}
          V: ${{ steps.tag.outputs.value }}
        run: |
          ssh -p "${P:-22}" "${U}@${H}" \
              "mkdir -p '${D}/${V}' && chmod 755 '${D}/${V}'"

      - name: Upload exe + sha256 to US mirror
        env:
          H: ${{ secrets.US_SSH_HOST }}
          P: ${{ secrets.US_SSH_PORT }}
          U: ${{ secrets.US_SSH_USER }}
          D: ${{ secrets.US_UPLOADS_DIR }}
          V: ${{ steps.tag.outputs.value }}
        run: |
          cd /tmp/rel
          scp -P "${P:-22}" -B -q *.exe *.exe.sha256 "${U}@${H}:${D}/${V}/"
          echo "已上传到 ${U}@${H}:${D}/${V}/"

      - name: Verify remote size
        env:
          H: ${{ secrets.US_SSH_HOST }}
          P: ${{ secrets.US_SSH_PORT }}
          U: ${{ secrets.US_SSH_USER }}
          D: ${{ secrets.US_UPLOADS_DIR }}
          V: ${{ steps.tag.outputs.value }}
        run: |
          ssh -p "${P:-22}" "${U}@${H}" \
              "ls -lh '${D}/${V}/' && du -sh '${D}/${V}/'"

      - name: Checkout (for scripts/send_feishu.py)
        uses: actions/checkout@v4

      - name: Prepare files list for Feishu
        run: |
          cd /tmp/rel
          : > /tmp/files.txt
          for f in *.exe; do
            size=$(stat -c '%s' "$f")
            sha=$(cat "$f.sha256" 2>/dev/null | awk '{print $1}')
            echo "$f  $size  $sha" >> /tmp/files.txt
          done
          echo "---- files.txt ----"
          cat /tmp/files.txt

      - name: Notify Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_BOT_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
          TAG: ${{ steps.tag.outputs.value }}
          FILES_TXT: /tmp/files.txt
          DOWNLOAD_BASE: http://download.ixweb.cc
          GITHUB_REPO: ${{ github.repository }}
        run: python3 scripts/send_feishu.py
