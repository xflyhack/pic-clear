name: Build Extract GUI EXE

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:


permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install cryptography>=41.0
          pip install pystray>=0.19.5 Pillow>=10.0.0 keyboard>=0.13.5
          pip install pyinstaller pyarmor

      - name: Write _version.py from git ref
        # 把 git ref (tag 名 v0.4.30 / 分支 main) 写入 _version.py,
        # 打包出来的 exe 版本号跟 git tag 对齐, GUI 的关于页 / --version 都能看到.
        run: |
          if "%GITHUB_REF_TYPE%"=="tag" (
            echo VERSION = "%GITHUB_REF_NAME%" > _version.py
          ) else (
            echo VERSION = "%GITHUB_REF_NAME%-%GITHUB_SHA:~0,7%" > _version.py
          )
          type _version.py
        shell: cmd

      - name: Prepare build folder
        run: |
          mkdir build_extract_gui
          copy pipeline.py build_extract_gui\
          copy pipe_gui.py build_extract_gui\
          copy extract_gui.py build_extract_gui\
          copy winpath_util.py build_extract_gui\
          copy env_probe.py build_extract_gui\
          copy subproc_group.py build_extract_gui\
          copy licensing.py build_extract_gui\
          copy otp_utils.py build_extract_gui\
          copy _version.py build_extract_gui\
        shell: cmd

      - name: Obfuscate with PyArmor
        run: |
          cd build_extract_gui
          REM 拆分 pyarmor gen 调用绕开 trial 版单次调用配额限制
          pyarmor gen --output dist_obf pipeline.py
          pyarmor gen --output dist_obf pipe_gui.py
          pyarmor gen --output dist_obf extract_gui.py
          pyarmor gen --output dist_obf licensing.py
          pyarmor gen --output dist_obf otp_utils.py
          dir dist_obf
          copy /Y dist_obf\pipeline.py pipeline.py
          copy /Y dist_obf\pipe_gui.py pipe_gui.py
          copy /Y dist_obf\extract_gui.py extract_gui.py
          copy /Y dist_obf\licensing.py licensing.py
          copy /Y dist_obf\otp_utils.py otp_utils.py
          cd ..
        shell: cmd

      - name: Build single-file exe (windowed，无控制台黑窗)
        run: |
          cd build_extract_gui
          pyinstaller --onefile --windowed --name extract_gui ^
            --icon "..\icon.ico" ^
            --add-data "..\icon.ico;." ^
            --add-data "..\icon.png;." ^
            --add-data "dist_obf\pyarmor_runtime_000000;pyarmor_runtime_000000" ^
            --hidden-import _version ^
            --hidden-import subproc_group ^
            --hidden-import winpath_util ^
            --hidden-import env_probe ^
            --hidden-import json ^
            --hidden-import base64 ^
            --hidden-import hashlib ^
            --hidden-import socket ^
            --hidden-import subprocess ^
            --hidden-import datetime ^
            --hidden-import signal ^
            --hidden-import ctypes ^
            --hidden-import ctypes.wintypes ^
            --hidden-import cryptography ^
            --hidden-import cryptography.hazmat.primitives.asymmetric.padding ^
            --hidden-import cryptography.hazmat.primitives.hashes ^
            --hidden-import cryptography.hazmat.primitives.serialization ^
            --hidden-import licensing ^
            --hidden-import otp_utils ^
            --hidden-import pipeline ^
            --hidden-import pipe_gui ^
            --hidden-import tkinter ^
            --hidden-import tkinter.ttk ^
            --hidden-import tkinter.filedialog ^
            --hidden-import tkinter.messagebox ^
            --hidden-import pystray ^
            --hidden-import pystray._win32 ^
            --hidden-import PIL ^
            --hidden-import PIL.Image ^
            --hidden-import PIL.ImageDraw ^
            --hidden-import keyboard ^
            --hidden-import uuid ^
            extract_gui.py
          cd ..
        shell: cmd

      - name: Show exe size
        run: dir build_extract_gui\dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extract-gui-windows-exe
          path: build_extract_gui/dist/extract_gui.exe
          if-no-files-found: error

      - name: Attach exe to GitHub Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build_extract_gui/dist/extract_gui.exe
          fail_on_unmatched_files: true
