name: Create Release Notes

# 打 tag（v*）时创建/更新 GitHub Release 的说明和标题。
# 8 个 exe 会由各自的 build-*-exe workflow 在 tag 触发时附加到这个 release 上。
#
# 用法：
#   git tag v0.1.2
#   git push origin v0.1.2
# 完成后所有编译 workflow 都会跑，产物挂到 https://github.com/<user>/<repo>/releases/tag/v0.1.2

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布的 tag（例如 v0.1.2）'
        required: true

permissions:
  contents: write
  actions: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release (draft=false, prerelease=false)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: "pic-clear ${{ steps.tag.outputs.value }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## pic-clear ${{ steps.tag.outputs.value }}

            **一次下载全部 8 个 Windows exe。** 每个 exe 独立打包、独立运行。

            ### 数旗系列品牌与 exe 对照

            | 品牌 | GUI (给用户跑) | 内核 (给 GUI 调用 / 命令行用) |
            |---|---|---|
            | 数旗_视频抽帧工具 | `sqFrameGrabGui.exe` | `sqFrameGrab.exe` |
            | 数旗_图片去重工具 | `sqDedupeGui.exe` | `sqDedupe.exe` |
            | 数旗_图片分类工具 | `sqClassifyGui.exe` | *(暂无独立内核 exe)* |
            | 数旗_数据分析工具 | `sqStatsViewerGui.exe` | — |

            > **改名对照**（老名 → 新名，2026-07 起统一 `sq*` 前缀）
            >
            > - `extract_frames.exe` → `sqFrameGrab.exe`
            > - `extract_gui.exe` → `sqFrameGrabGui.exe`
            > - `dedupe_pic.exe` → `sqDedupe.exe`
            > - `dedupe_gui.exe` → `sqDedupeGui.exe`
            > - `classify_gui.exe` → `sqClassifyGui.exe`
            > - `stats_viewer_gui.exe` → `sqStatsViewerGui.exe`

            ### 本次 Release 挂载的 exe

            | exe | 作用 | 大概大小 |
            |---|---|---|
            | `sqFrameGrab.exe` | 数旗_视频抽帧工具**内核**：H265/MP4 抽帧（1 秒 1 帧，内嵌 ffmpeg） | ~120 MB |
            | `sqFrameGrabGui.exe` | 数旗_视频抽帧工具 **GUI**：选源+子目录多选+fps | ~20-30 MB |
            | `sqDedupe.exe` | 数旗_图片去重工具**内核**：近似去重 + YOLO 人/车保护 + 前后帧车运动保护 | ~50 MB |
            | `sqDedupeGui.exe` | 数旗_图片去重工具 **GUI**：单目录/一级/递归+强制重跑 | ~20-30 MB |
            | `sqClassifyGui.exe` | 数旗_图片分类工具 **GUI**：二次分类 | ~70 MB |
            | `sqStatsViewerGui.exe` | 数旗_数据分析工具 **GUI**：每机每天统计汇总，磁盘/目录钻取 + 导 CSV | ~40 MB |
            | `diagPicCheck.exe` | 长路径诊断工具：6 种打开方式一次摸清，堡垒机排障必备 | ~120 MB |
            | `genLicGui.exe` | 图形版 license 签发工具（内置私钥），⚠ 作者用 | ~15 MB |

            ---

            ### 使用说明

            - 首次使用需要 license：先跑一次 `sqDedupe.exe --fingerprint` 拿指纹，
              找作者用 `genLicGui.exe` 生成 `license.lic`，放到 exe 同目录
            - 所有 `sq*` exe 共用同一份 `license.lic`
            - 详细说明看仓库 [`README.md`](../../blob/main/README.md) 和 [`docs/`](../../tree/main/docs)

            ### 自动生成的更新记录

            （下面这段由 GitHub 自动生成，列出这次 tag 相比上一个 tag 的所有 commit）

      # release-published 用默认 GITHUB_TOKEN 创建 release 不会级联触发其他 workflow
      # (GitHub 防递归). 所以这里显式 workflow_dispatch upload-to-us, 让飞书通知能跑起来.
      - name: Trigger upload-to-us workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/upload-to-us.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"tag\":\"${TAG}\"}}"
          echo "已请求 upload-to-us workflow_dispatch, tag=${TAG}"
