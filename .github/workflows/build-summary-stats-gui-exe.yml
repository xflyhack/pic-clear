name: Build Summary Stats GUI EXE

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # softprops/action-gh-release 需要写权限来创建/更新 Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install cryptography>=41.0
          pip install pyinstaller pyarmor

      - name: Write _version.py from git ref
        # 把 git ref (tag 名 v0.4.30 / 分支 main) 写入 _version.py,
        # 打包出来的 exe 版本号跟 git tag 对齐, GUI 的关于页 / --version 都能看到.
        run: |
          if "%GITHUB_REF_TYPE%"=="tag" (
            echo VERSION = "%GITHUB_REF_NAME%" > _version.py
          ) else (
            echo VERSION = "%GITHUB_REF_NAME%-%GITHUB_SHA:~0,7%" > _version.py
          )
          type _version.py
        shell: cmd

      - name: Prepare build folder
        run: |
          mkdir build_summary_gui
          copy summary_stats_gui.py build_summary_gui\
          copy licensing.py build_summary_gui\
          copy _version.py build_summary_gui\
          copy winpath_util.py build_summary_gui\\
          copy env_probe.py build_summary_gui\\
        shell: cmd

      - name: Obfuscate with PyArmor
        run: |
          cd build_summary_gui
          REM 拆分 pyarmor gen 调用绕开 trial 版单次调用配额限制
          pyarmor gen --output dist_obf summary_stats_gui.py
          pyarmor gen --output dist_obf licensing.py
          dir dist_obf
          copy /Y dist_obf\summary_stats_gui.py summary_stats_gui.py
          copy /Y dist_obf\licensing.py licensing.py
          cd ..
        shell: cmd

      - name: Build single-file exe (windowed，无控制台黑窗)
        run: |
          cd build_summary_gui
          pyinstaller --onefile --windowed --name summary_stats_gui ^
            --icon "..\icon.ico" ^
            --add-data "..\icon.ico;." ^
            --add-data "..\icon.png;." ^
            --add-data "dist_obf\pyarmor_runtime_000000;pyarmor_runtime_000000" ^
            --hidden-import _version ^
            --hidden-import env_probe ^
            --hidden-import winpath_util ^
            --hidden-import json ^
            --hidden-import base64 ^
            --hidden-import hashlib ^
            --hidden-import csv ^
            --hidden-import subprocess ^
            --hidden-import datetime ^
            --hidden-import ctypes ^
            --hidden-import ctypes.wintypes ^
            --hidden-import cryptography ^
            --hidden-import cryptography.hazmat.primitives.asymmetric.padding ^
            --hidden-import cryptography.hazmat.primitives.hashes ^
            --hidden-import cryptography.hazmat.primitives.serialization ^
            --hidden-import licensing ^
            --hidden-import tkinter ^
            --hidden-import tkinter.ttk ^
            --hidden-import tkinter.filedialog ^
            --hidden-import tkinter.messagebox ^
            summary_stats_gui.py
          cd ..
        shell: cmd

      - name: Show exe size
        run: dir build_summary_gui\dist

      - name: Smoke test (--fingerprint)
        shell: pwsh
        run: |
          chcp 65001
          build_summary_gui\dist\summary_stats_gui.exe --fingerprint
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: summary-stats-gui-windows-exe
          path: build_summary_gui/dist/summary_stats_gui.exe
          if-no-files-found: error

      - name: Attach exe to GitHub Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build_summary_gui/dist/summary_stats_gui.exe
          fail_on_unmatched_files: true
