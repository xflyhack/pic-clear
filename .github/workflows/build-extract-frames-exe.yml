name: Build Extract Frames EXE

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # softprops/action-gh-release 需要写权限来创建/更新 Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install cryptography>=41.0
          pip install pyinstaller pyarmor

      - name: Write _version.py from git ref
        # 把 git ref (tag 名 v0.4.30 / 分支 main) 写入 _version.py,
        # 打包出来的 exe 版本号跟 git tag 对齐, GUI 的关于页 / --version 都能看到.
        run: |
          if "%GITHUB_REF_TYPE%"=="tag" (
            echo VERSION = "%GITHUB_REF_NAME%" > _version.py
          ) else (
            echo VERSION = "%GITHUB_REF_NAME%-%GITHUB_SHA:~0,7%" > _version.py
          )
          type _version.py
        shell: cmd

      - name: Download ffmpeg + ffprobe (static build for Windows)
        # BtbN 提供的 gpl 静态编译版, 一个 zip 里同时带 ffmpeg.exe / ffprobe.exe.
        # v0.4.100: 顺带把 ffprobe.exe 也拿出来, 供 extract_frames 抽帧后 probe
        # 视频时长落库 (v0.4.92 加的 duration 逻辑依赖它).
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_dl
          # 找到 ffmpeg.exe / ffprobe.exe 各自拷到当前目录
          $ff = Get-ChildItem -Recurse ffmpeg_dl -Filter ffmpeg.exe  | Select-Object -First 1
          $fp = Get-ChildItem -Recurse ffmpeg_dl -Filter ffprobe.exe | Select-Object -First 1
          Copy-Item $ff.FullName -Destination ffmpeg.exe
          Copy-Item $fp.FullName -Destination ffprobe.exe
          Get-Item ffmpeg.exe   | Select-Object Name, Length
          Get-Item ffprobe.exe  | Select-Object Name, Length
        shell: pwsh

      - name: Prepare build folder
        # 把要打包的 .py 复制到独立目录，避免和 dedupe_pic 的 workflow 互相污染
        run: |
          mkdir build_extract
          copy extract_frames.py build_extract\
          copy licensing.py build_extract\
          copy stats_db.py build_extract\
          copy winpath_util.py build_extract\
          copy env_probe.py build_extract\
          copy _version.py build_extract\
        shell: cmd

      - name: Obfuscate with PyArmor
        run: |
          cd build_extract
          REM 拆分 pyarmor gen 调用绕开 trial 版单次调用配额限制
          pyarmor gen --output dist_obf extract_frames.py
          pyarmor gen --output dist_obf licensing.py
          pyarmor gen --output dist_obf stats_db.py
          dir dist_obf
          copy /Y dist_obf\extract_frames.py extract_frames.py
          copy /Y dist_obf\licensing.py licensing.py
          copy /Y dist_obf\stats_db.py stats_db.py
          cd ..
        shell: cmd

      - name: Build single-file exe (embed ffmpeg + pyarmor runtime)
        run: |
          cd build_extract
          pyinstaller --onefile --console --name sqFrameGrab ^
            --icon "..\icon.ico" ^
            --add-binary "..\ffmpeg.exe;." ^
            --add-binary "..\ffprobe.exe;." ^
            --add-data "dist_obf\pyarmor_runtime_000000;pyarmor_runtime_000000" ^
            --hidden-import _version ^
            --hidden-import winpath_util ^
            --hidden-import env_probe ^
            --hidden-import json ^
            --hidden-import base64 ^
            --hidden-import hashlib ^
            --hidden-import socket ^
            --hidden-import subprocess ^
            --hidden-import datetime ^
            --hidden-import ctypes ^
            --hidden-import ctypes.wintypes ^
            --hidden-import concurrent ^
            --hidden-import concurrent.futures ^
            --hidden-import concurrent.futures.thread ^
            --hidden-import cryptography ^
            --hidden-import cryptography.hazmat.primitives.asymmetric.padding ^
            --hidden-import cryptography.hazmat.primitives.hashes ^
            --hidden-import cryptography.hazmat.primitives.serialization ^
            --hidden-import licensing ^
            --hidden-import stats_db ^
            --hidden-import sqlite3 ^
            extract_frames.py
          cd ..
        shell: cmd

      - name: Smoke test (fingerprint subcommand should work without license)
        env:
          PYTHONIOENCODING: utf-8
        run: |
          chcp 65001
          build_extract\dist\sqFrameGrab.exe --fingerprint
        shell: cmd

      - name: Smoke test (no license → must exit 3)
        env:
          PYTHONIOENCODING: utf-8
        run: |
          chcp 65001
          build_extract\dist\sqFrameGrab.exe D:\ D:\out
          set RC=%ERRORLEVEL%
          if "%RC%"=="3" (
            echo Smoke test PASS: got expected exit code 3
            exit /b 0
          )
          echo Unexpected exit code %RC% ^(expected 3^)
          exit /b 1
        shell: cmd

      - name: Show exe size
        run: dir build_extract\dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqFrameGrab-windows-exe
          path: build_extract/dist/sqFrameGrab.exe
          if-no-files-found: error

      - name: Attach exe to GitHub Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build_extract/dist/sqFrameGrab.exe
          fail_on_unmatched_files: true
