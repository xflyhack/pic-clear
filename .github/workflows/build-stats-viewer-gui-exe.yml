name: Build Stats Viewer GUI EXE

on:
  # v0.4.132: 关闭 push main 自动触发, 避免每次改 py 都跑 30 分钟 CI + 撞 API 限流.
  # 保留 tag 触发 (稳定版 -> Release) + workflow_dispatch (开发测试版 -> Artifacts).
  push:
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyarmor
          pip install matplotlib numpy
          pip install pystray>=0.19.5 Pillow>=10.0.0 keyboard>=0.13.5

      - name: Write _version.py from git ref
        run: |
          if "%GITHUB_REF_TYPE%"=="tag" (
            echo VERSION = "%GITHUB_REF_NAME%" > _version.py
          ) else (
            echo VERSION = "%GITHUB_REF_NAME%-%GITHUB_SHA:~0,7%" > _version.py
          )
          type _version.py
        shell: cmd

      - name: Prepare build folder
        run: |
          mkdir build_stats_viewer
          copy stats_viewer_gui.py build_stats_viewer\
          copy stats_db.py         build_stats_viewer\
          copy _version.py         build_stats_viewer\
          copy gui_log_util.py     build_stats_viewer\
          copy tray_util.py         build_stats_viewer\
          copy env_probe.py        build_stats_viewer\
          copy winpath_util.py     build_stats_viewer\
        shell: cmd

      - name: Obfuscate with PyArmor
        run: |
          cd build_stats_viewer
          pyarmor gen --output dist_obf stats_viewer_gui.py
          pyarmor gen --output dist_obf stats_db.py
          dir dist_obf
          copy /Y dist_obf\stats_viewer_gui.py stats_viewer_gui.py
          copy /Y dist_obf\stats_db.py         stats_db.py
          cd ..
        shell: cmd

      - name: Build single-file exe (windowed)
        run: |
          cd build_stats_viewer
          pyinstaller --onefile --windowed --name sqStatsViewerGui ^
            --icon "..\icon.ico" ^
            --add-data "..\icon.ico;." ^
            --add-data "..\icon.png;." ^
            --add-data "dist_obf\pyarmor_runtime_000000;pyarmor_runtime_000000" ^
            --hidden-import _version ^
            --hidden-import gui_log_util ^
            --hidden-import tray_util ^
            --hidden-import pystray ^
            --hidden-import pystray._win32 ^
            --hidden-import PIL.Image ^
            --hidden-import keyboard ^
            --hidden-import env_probe ^
            --hidden-import winpath_util ^
            --hidden-import stats_db ^
            --hidden-import sqlite3 ^
            --hidden-import json ^
            --hidden-import tkinter ^
            --hidden-import tkinter.ttk ^
            --hidden-import tkinter.filedialog ^
            --hidden-import matplotlib ^
            --hidden-import matplotlib.backends.backend_tkagg ^
            --hidden-import numpy ^
            stats_viewer_gui.py
          cd ..
        shell: cmd

      - name: Show exe size
        run: dir build_stats_viewer\dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqStatsViewerGui-windows-exe
          path: build_stats_viewer/dist/sqStatsViewerGui.exe
          if-no-files-found: error

      - name: Attach exe to GitHub Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build_stats_viewer/dist/sqStatsViewerGui.exe
          fail_on_unmatched_files: true
