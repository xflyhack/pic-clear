name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyarmor

      - name: Install export-only deps (for yolov8n.onnx)
        run: |
          pip install ultralytics onnx onnxslim

      - name: Export yolov8n.onnx
        run: |
          curl -L -o yolov8n.pt https://github.com/ultralytics/assets/releases/download/v8.3.0/yolov8n.pt
          python -c "from ultralytics import YOLO; YOLO('yolov8n.pt').export(format='onnx', imgsz=640, opset=12, simplify=True, dynamic=False)"
          dir yolov8n.onnx

      - name: Obfuscate Python sources with PyArmor
        # 把 3 个 .py 加密成花指令字节码，产物在 dist_obf/
        # 加密后目录里同名文件替代原文件，注入到打包流程
        run: |
          pyarmor gen --output dist_obf dedupe_pic.py detector.py licensing.py
          dir dist_obf
          # 用加密版本覆盖原文件
          copy /Y dist_obf\dedupe_pic.py dedupe_pic.py
          copy /Y dist_obf\detector.py detector.py
          copy /Y dist_obf\licensing.py licensing.py
        shell: cmd

      - name: Build single-file exe (with embedded model + pyarmor runtime)
        run: |
          pyinstaller --onefile --console --name dedupe_pic ^
            --add-data "yolov8n.onnx;." ^
            --add-data "dist_obf\pyarmor_runtime_000000;pyarmor_runtime_000000" ^
            --hidden-import onnxruntime ^
            --hidden-import cryptography ^
            --hidden-import cryptography.hazmat.primitives.asymmetric.padding ^
            --hidden-import cryptography.hazmat.primitives.hashes ^
            --hidden-import cryptography.hazmat.primitives.serialization ^
            --hidden-import detector ^
            --hidden-import licensing ^
            dedupe_pic.py
        shell: cmd

      - name: Smoke test (fingerprint subcommand should work without license)
        env:
          PYTHONIOENCODING: utf-8
        run: |
          chcp 65001
          dist\dedupe_pic.exe --fingerprint

      - name: Smoke test (no license → should exit 3 with fingerprint)
        env:
          PYTHONIOENCODING: utf-8
        continue-on-error: true
        run: |
          chcp 65001
          dist\dedupe_pic.exe D:\ 2>&1 || echo "expected non-zero exit"

      - name: Show exe size
        run: dir dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dedupe_pic-windows-exe
          path: dist/dedupe_pic.exe
          if-no-files-found: error
