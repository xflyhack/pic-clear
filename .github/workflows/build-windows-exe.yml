name: Build Dedupe Pic EXE

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # softprops/action-gh-release 需要写权限来创建/更新 Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyarmor

      - name: Install export-only deps (for yolov8n.onnx)
        run: |
          pip install ultralytics onnx onnxslim

      - name: Export yolov8n.onnx
        run: |
          curl -L -o yolov8n.pt https://github.com/ultralytics/assets/releases/download/v8.3.0/yolov8n.pt
          python -c "from ultralytics import YOLO; YOLO('yolov8n.pt').export(format='onnx', imgsz=640, opset=12, simplify=True, dynamic=False)"
          dir yolov8n.onnx

      - name: Obfuscate Python sources with PyArmor
        # 把 3 个 .py 加密成花指令字节码，产物在 dist_obf/
        # 加密后目录里同名文件替代原文件，注入到打包流程
        run: |
          pyarmor gen --output dist_obf dedupe_pic.py detector.py licensing.py
          dir dist_obf
          # 用加密版本覆盖原文件
          copy /Y dist_obf\dedupe_pic.py dedupe_pic.py
          copy /Y dist_obf\detector.py detector.py
          copy /Y dist_obf\licensing.py licensing.py
        shell: cmd

      - name: Build single-file exe (with embedded model + pyarmor runtime)
        run: |
          pyinstaller --onefile --console --name dedupe_pic ^
            --add-data "yolov8n.onnx;." ^
            --add-data "dist_obf\pyarmor_runtime_000000;pyarmor_runtime_000000" ^
            --hidden-import onnxruntime ^
            --hidden-import PIL ^
            --hidden-import PIL.Image ^
            --hidden-import PIL.ImageFile ^
            --hidden-import numpy ^
            --hidden-import json ^
            --hidden-import base64 ^
            --hidden-import hashlib ^
            --hidden-import socket ^
            --hidden-import subprocess ^
            --hidden-import datetime ^
            --hidden-import ctypes ^
            --hidden-import ctypes.wintypes ^
            --hidden-import cryptography ^
            --hidden-import cryptography.hazmat.primitives.asymmetric.padding ^
            --hidden-import cryptography.hazmat.primitives.hashes ^
            --hidden-import cryptography.hazmat.primitives.serialization ^
            --hidden-import detector ^
            --hidden-import licensing ^
            dedupe_pic.py
        shell: cmd

      - name: Smoke test (fingerprint subcommand should work without license)
        env:
          PYTHONIOENCODING: utf-8
        run: |
          chcp 65001
          dist\dedupe_pic.exe --fingerprint

      - name: Smoke test (no license → must exit 3)
        env:
          PYTHONIOENCODING: utf-8
        # 期望退出码就是 3（授权失败）。任何其它退出码都视为异常并让 step 变红。
        run: |
          chcp 65001
          dist\dedupe_pic.exe D:\
          set RC=%ERRORLEVEL%
          if "%RC%"=="3" (
            echo Smoke test PASS: got expected exit code 3
            exit /b 0
          )
          echo Unexpected exit code %RC% ^(expected 3^)
          exit /b 1
        shell: cmd

      - name: Show exe size
        run: dir dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dedupe_pic-windows-exe
          path: dist/dedupe_pic.exe
          if-no-files-found: error

      - name: Attach exe to GitHub Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dedupe_pic.exe
          fail_on_unmatched_files: true
