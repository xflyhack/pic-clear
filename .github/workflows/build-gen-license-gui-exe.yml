name: Build Gen License GUI EXE

on:
  # v0.4.132: 关闭 push main 自动触发, 避免每次改 py 都跑 30 分钟 CI + 撞 API 限流.
  # 保留 tag 触发 (稳定版 -> Release) + workflow_dispatch (开发测试版 -> Artifacts).
  push:
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: write   # softprops/action-gh-release 需要写权限来创建/更新 Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install cryptography>=41.0
          pip install "ttkbootstrap>=1.10,<2.0"
          pip install pyinstaller

      - name: Write _version.py from git ref
        # 把 git ref (tag 名 v0.4.30 / 分支 main) 写入 _version.py,
        # 打包出来的 exe 版本号跟 git tag 对齐, GUI 的关于页 / --version 都能看到.
        run: |
          if "%GITHUB_REF_TYPE%"=="tag" (
            echo VERSION = "%GITHUB_REF_NAME%" > _version.py
          ) else (
            echo VERSION = "%GITHUB_REF_NAME%-%GITHUB_SHA:~0,7%" > _version.py
          )
          type _version.py
        shell: cmd

      - name: Prepare build folder
        run: |
          mkdir build_gen_license_gui
          copy gen_license_gui.py build_gen_license_gui\
          copy _version.py build_gen_license_gui\
          copy winpath_util.py build_gen_license_gui\\
          copy env_probe.py build_gen_license_gui\\
          mkdir build_gen_license_gui\secrets
          copy secrets\private.pem build_gen_license_gui\secrets\
        shell: cmd

      - name: Build single-file exe (windowed，无控制台黑窗)
        run: |
          cd build_gen_license_gui
          pyinstaller --onefile --windowed --name genLicGui ^
            --icon "..\icon.ico" ^
            --add-data "..\icon.ico;." ^
            --add-data "..\icon.png;." ^
            --add-data "secrets\private.pem;secrets" ^
            --collect-all ttkbootstrap ^
            --hidden-import _version ^
            --hidden-import env_probe ^
            --hidden-import winpath_util ^
            --hidden-import cryptography ^
            --hidden-import cryptography.hazmat.primitives.asymmetric.padding ^
            --hidden-import cryptography.hazmat.primitives.hashes ^
            --hidden-import cryptography.hazmat.primitives.serialization ^
            --hidden-import tkinter ^
            --hidden-import tkinter.ttk ^
            --hidden-import tkinter.filedialog ^
            --hidden-import tkinter.messagebox ^
            --hidden-import ttkbootstrap ^
            gen_license_gui.py
          cd ..
        shell: cmd

      - name: Show exe size
        run: dir build_gen_license_gui\dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gen-lic-gui-windows-exe
          path: build_gen_license_gui/dist/genLicGui.exe
          if-no-files-found: error

      - name: Attach exe to GitHub Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build_gen_license_gui/dist/genLicGui.exe
          fail_on_unmatched_files: true
