# 一键起：docker compose -f docker-compose.otp_web.yml up -d
# 打开：http://localhost:5000
services:
  otp-web:
    build:
      context: .
      dockerfile: Dockerfile.otp_web
    container_name: pic-clear-otp-web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PIC_CLEAR_OTP_VAULT: /data
    volumes:
      # 命名 volume 持久化到 Docker 卷；想直接看宿主机文件改成 ./otp_vault:/data
      - otp_vault:/data

volumes:
  otp_vault:
